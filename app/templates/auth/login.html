{% extends "base.html" %}
{% block content %}
  <h1>Entrar</h1>
  <form method="post">
    {{ form.hidden_tag() }}

    <label>Usuário ou Email</label>
    {{ form.login(class_="input") }}

    <label>Senha</label>
    {{ form.password(class_="input") }}

    {{ form.submit(class_="btn") }}
  </form>
{% endblock %}
