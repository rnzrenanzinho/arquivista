{% extends "base.html" %}
{% block content %}
  <h1>Nova unidade</h1>

  <form method="post">
    {{ form.hidden_tag() }}

    <label>Nome</label>
    {{ form.name(class_="input", placeholder="Ex: RNZ Burger") }}

    <label style="display:flex;gap:8px;align-items:center;margin:10px 0;">
      {{ form.is_active() }} Ativa
    </label>

    {{ form.submit(class_="btn") }}
  </form>
{% endblock %}
